<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>生产统计系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
    rel="stylesheet"
  />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            neutral: '#F5F7FA',
            dark: '#1D2129'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
      .btn-hover { transition: all 0.3s; }
    }
  </style>
</head>
<body class="bg-neutral min-h-screen">
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-lg font-bold text-primary flex items-center">
        <i class="fa fa-clipboard-check mr-2"></i>生产进度填报
      </h1>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6 mb-20">
    <section id="fill-section" class="block">
      <div class="bg-white rounded-lg p-6 card-shadow max-w-2xl mx-auto">
        <h2 id="fill-title" class="text-xl font-bold text-center mb-2">MY26-033-19/20生产进度</h2>
        <p id="fill-desc" class="text-gray-600 text-center mb-6"></p>
        <div id="fill-fields" class="space-y-5">
          <!-- 系统自动生成表单 -->
        </div>
        <div class="mt-8 flex gap-4">
          <button id="submit-fill" class="flex-1 py-3 bg-primary text-white rounded font-medium btn-hover">
            <i class="fa fa-check-circle mr-1"></i>提交
          </button>
          <button id="reset-fill" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded font-medium btn-hover">
            <i class="fa fa-refresh mr-1"></i>重置
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    // ==============================================
    // 🔥 你的问卷已经固化在这里，任何人打开都能填
    // ==============================================
    const FIXED_SURVEY = {
      "surveyId": "s_1776825816366_zbpjg",
      "title": "MY26-033-19/20生产进度",
      "desc": "",
      "questions": [
        {
          "type": "radio",
          "title": "工序",
          "options": ["裁剪","绗缝","检验","包装"]
        },
        {
          "type": "select",
          "title": "订单号",
          "options": ["033-19","033-20"]
        },
        {
          "type": "input",
          "title": "当日生产数据：灰色",
          "options": []
        },
        {
          "type": "input",
          "title": "当日生产数据：藏青",
          "options": []
        },
        {
          "type": "input",
          "title": "当日生产数据：米白",
          "options": []
        }
      ]
    };

    // 初始化页面
    window.addEventListener('DOMContentLoaded', () => {
      initFixedFill();
    });

    // 加载固化问卷
    function initFixedFill() {
      const s = FIXED_SURVEY;
      document.getElementById('fill-title').textContent = s.title;
      document.getElementById('fill-desc').textContent = s.desc;
      const fields = document.getElementById('fill-fields');
      
      fields.innerHTML = `
        <div class="p-3 border rounded">
          <label class="block text-sm font-medium mb-1">填写日期 <span class="text-red-500">*</span></label>
          <input id="fill-date" type="date" class="w-full px-3 py-2 border rounded" required>
        </div>
        <div class="p-3 border rounded">
          <label class="block text-sm font-medium mb-1">负责人姓名 <span class="text-red-500">*</span></label>
          <input id="fill-name" type="text" class="w-full px-3 py-2 border rounded" placeholder="请输入姓名" required>
        </div>
      `;
      document.getElementById('fill-date').valueAsDate = new Date();

      s.questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'p-3 border rounded';
        div.innerHTML = `<label class="block text-sm font-medium mb-1">${q.title} <span class="text-red-500">*</span></label>`;
        
        if (q.type === 'radio') {
          q.options.forEach((opt, i) => {
            div.innerHTML += `
            <div class="flex items-center mb-1">
              <input type="radio" name="q${idx}" value="${opt}" id="q${idx}_${i}" class="mr-1" required>
              <label for="q${idx}_${i}">${opt}</label>
            </div>`;
          });
        } else if (q.type === 'select') {
          let sel = `<select name="q${idx}" class="w-full px-3 py-2 border rounded" required>
                      <option value="">请选择</option>`;
          q.options.forEach(o => sel += `<option value="${o}">${o}</option>`);
          div.innerHTML += sel + '</select>';
        } else if (q.type === 'input') {
          div.innerHTML += `<input type="text" name="q${idx}" class="w-full px-3 py-2 border rounded" placeholder="请填写" required>`;
        }
        fields.appendChild(div);
      });
    }

    // 提交
    document.getElementById('submit-fill').addEventListener('click', () => {
      const date = document.getElementById('fill-date').value;
      const name = document.getElementById('fill-name').value.trim();
      if (!date || !name) { alert('请填写日期和姓名'); return; }
      
      const answers = [];
      document.querySelectorAll('#fill-fields [name^="q"]').forEach(el => {
        if ((el.type === 'radio' && el.checked) || (el.type !== 'radio' && el.value)) {
          const idx = parseInt(el.name.replace('q', ''));
          answers.push({
            题目: FIXED_SURVEY.questions[idx].title,
            内容: el.value
          });
        }
      });

      const record = {
        问卷: FIXED_SURVEY.title,
        日期: date,
        负责人: name,
        提交时间: new Date().toLocaleString(),
        明细: answers
      };

      // 保存到本地
      let records = JSON.parse(localStorage.getItem('records') || '[]');
      records.unshift(record);
      localStorage.setItem('records', JSON.stringify(records));
      
      alert('提交成功！\n\n你可以导出记录汇总。');
      document.getElementById('reset-fill').click();
    });

    // 重置
    document.getElementById('reset-fill').onclick = () => {
      document.querySelectorAll('#fill-fields input, #fill-fields select').forEach(e => {
        if (e.type === 'radio') e.checked = false;
        else if (e.id !== 'fill-date') e.value = '';
      });
    };
  </script>
</body>
</html>
